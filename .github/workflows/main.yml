name: Gemma 4 Test (Fixed)

on:
  workflow_dispatch:

jobs:
  test-gemma4:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake git wget

      - name: Clone and build llama.cpp
        run: |
          git clone https://github.com/ggerganov/llama.cpp
          cd llama.cpp
          cmake -B build
          cmake --build build --config Release -j$(nproc)

      - name: Download Gemma 4 E4B (Q4)
        run: |
          mkdir -p models
          cd models
          wget -c -O gemma4.gguf \
          https://huggingface.co/unsloth/gemma-4-4b-it-GGUF/resolve/main/gemma-4-4b-it-q4_k_m.gguf

      - name: Run Gemma 4
        run: |
          cd llama.cpp
          ./build/bin/llama-cli \
            -m ../models/gemma4.gguf \
            -p "Explain black holes simply." \
            -n 200 \
            -t 4

name: Multimodal AI (Image + Chat)

on:
  workflow_dispatch:

jobs:
  run-ai:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake git wget curl python3 python3-pip

      - name: Install NetBird
        run: curl -fsSL https://pkgs.netbird.io/install.sh | sh

      - name: Connect NetBird
        run: |
          sudo netbird up --setup-key C2E7F429-1F54-4FDC-AF61-FC67A5C59500 --allow-server-ssh --enable-ssh-root

      - name: Get NetBird IP
        id: ip
        run: |
          NB_IP=$(sudo netbird status | grep -oP 'NetBird IP: \K[^\s]+')
          echo "netbird_ip=$NB_IP" >> $GITHUB_OUTPUT

      - name: Build llama.cpp
        run: |
          git clone https://github.com/ggerganov/llama.cpp
          cd llama.cpp
          cmake -B build
          cmake --build build --config Release -j$(nproc)

      - name: Download LLaVA model + mmproj
        run: |
          mkdir -p models
          cd models
          wget -c https://huggingface.co/mys/llava-v1.5-7b-GGUF/resolve/main/llava-v1.5-7b-q4_k_m.gguf
          wget -c https://huggingface.co/mys/llava-v1.5-7b-GGUF/resolve/main/mmproj-model-f16.gguf

      - name: Start multimodal server
        run: |
          cd llama.cpp
          nohup ./build/bin/llama-server \
            -m ../models/llava-v1.5-7b-q4_k_m.gguf \
            --mmproj ../models/mmproj-model-f16.gguf \
            --host 127.0.0.1 \
            --port 11434 \
            -t 4 > server.log 2>&1 &

      - name: Install Open WebUI
        run: |
          pip install open-webui

      - name: Start WebUI
        run: |
          nohup open-webui serve --host 0.0.0.0 --port 3000 > webui.log 2>&1 &

      - name: Show access
        run: |
          echo "===================================="
          echo "Web UI:"
          echo "http://${{ steps.ip.outputs.netbird_ip }}:3000"
          echo "===================================="

      - name: Keep alive
        run: sleep 6h
